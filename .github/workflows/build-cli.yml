name: Build CLI Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Build with PyInstaller
        run: .venv/Scripts/python.exe -m PyInstaller --clean rta.spec

      - name: Rename binary
        working-directory: dist
        run: mv rta.exe rta-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rta-windows
          path: dist/rta-windows.exe

  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --dev

      - name: Build with PyInstaller
        run: .venv/bin/python -m PyInstaller --clean rta.spec

      - name: Rename binary
        working-directory: dist
        run: mv rta rta-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rta-linux
          path: dist/rta-linux

  release:
    name: Attach to Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: rta-windows
          path: ./artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: rta-linux
          path: ./artifacts

      - name: Create release and attach binaries
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/rta-windows.exe
            ./artifacts/rta-linux
          fail_on_unmatched_files: true

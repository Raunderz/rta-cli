name: Build CLI & Attach to Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: cli
        run: uv sync

      - name: Build with PyInstaller
        working-directory: cli
        run: .venv/Scripts/python.exe -m PyInstaller --clean rta.spec

      - name: Rename binary
        working-directory: cli/dist
        run: mv rta.exe rta-windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rta-windows
          path: cli/dist/rta-windows.exe

  build-linux:
    name: Build Linux exe
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        working-directory: cli
        run: uv sync

      - name: Build with PyInstaller
        working-directory: cli
        run: .venv/bin/python -m PyInstaller --clean rta.spec

      - name: Rename binary
        working-directory: cli/dist
        run: mv rta rta-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rta-linux
          path: cli/dist/rta-linux

  attach-to-release:
    name: Attach binaries to release
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: rta-windows
          path: ./artifacts

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: rta-linux
          path: ./artifacts

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./artifacts/rta-windows.exe
            ./artifacts/rta-linux
          fail_on_unmatched_files: true

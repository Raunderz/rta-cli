name: Build & Release CLI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: rta-linux
            ext: ''
          - os: macos-latest
            artifact: rta-macos
            ext: ''
          - os: windows-latest
            artifact: rta-windows
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync
        working-directory: cli

      - name: Get version from tag
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"

      - name: Inject version
        shell: bash
        working-directory: cli
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/VERSION = \".*\"/VERSION = \"$VERSION\"/" src/kon/version.py
          cat src/kon/version.py | grep VERSION

      - name: Build binary
        shell: bash
        working-directory: cli
        run: |
          uv run python -m PyInstaller --clean rta.spec

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        working-directory: cli
        run: mv dist/rta dist/${{ matrix.artifact }}-v${{ steps.version.outputs.version }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        working-directory: cli
        shell: pwsh
        run: Rename-Item dist/rta.exe "${{ matrix.artifact }}-v${{ steps.version.outputs.version }}.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: cli/dist/${{ matrix.artifact }}-v${{ steps.version.outputs.version }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waitlist | Rta</title>
    <link rel="stylesheet" href="/style.css" />
    <style>
        .waitlist-page {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
            position: relative;
            z-index: 2;
            text-align: center;
        }
        .back-link {
            margin-bottom: 4rem;
            color: var(--text-secondary);
            text-decoration: none;
            text-transform: uppercase;
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.3em;
            transition: all 0.4s var(--ease-out-expo);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-link:hover {
            color: var(--text-primary);
            letter-spacing: 0.4em;
        }
        .iframe-container {
            width: 100%;
            max-width: 600px;
            height: 580px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg-surface);
            backdrop-filter: blur(24px);
            overflow: hidden;
            box-shadow: 0 40px 80px -20px rgba(0,0,0,0.8);
            position: relative;
        }
        .iframe-container::before {
            content: "";
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, var(--accent-glow), transparent);
            pointer-events: none;
            z-index: 1;
        }
        .iframe-container iframe {
            position: relative;
            z-index: 2;
        }
        .footer-line {
            margin-top: 4rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3em;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="waitlist-page">
        <a href="/" class="back-link">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            return to base
        </a>
        <div class="iframe-container">
            <iframe
                src="https://docs.google.com/forms/d/e/1FAIpQLSfnm1xCMBLUks3NIFWDfcyjvc6zIzC5gkQkevuXnTSGUnPQOQ/viewform?embedded=true"
                frameborder="0"
                marginheight="0"
                marginwidth="0"
                width="100%"
                height="100%">Loading…</iframe>
        </div>
        <p class="footer-line">Convergence Phase — October 2026</p>
    </div>
</body>
</html>

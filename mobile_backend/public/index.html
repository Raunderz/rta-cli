<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TempDev - Temporary Cloud Dev Environments</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #0d1117;
      color: #c9d1d9;
      overflow: hidden;
      height: 100vh;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    #header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    #header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #env-info {
      font-size: 12px;
      color: #8b949e;
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    #env-info strong {
      color: #58a6ff;
      font-family: 'Courier New', monospace;
    }

    #tunnel-section {
      display: none;
      gap: 8px;
      align-items: center;
    }

    #tunnel-url {
      padding: 4px 8px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      cursor: pointer;
      color: #58a6ff;
      font-size: 11px;
      text-decoration: none;
      font-family: 'Courier New', monospace;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
    }

    #tunnel-url:hover {
      background: #161b22;
      border-color: #58a6ff;
    }

    #controls {
      display: flex;
      gap: 8px;
    }

    button {
      padding: 6px 12px;
      background: #238636;
      color: #fff;
      border: 1px solid #2ea043;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: background 0.15s, border-color 0.15s;
      font-family: monospace;
    }

    button:hover:not(:disabled) {
      background: #2ea043;
      border-color: #3fb950;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button.danger {
      background: #da3633;
      border-color: #f85149;
    }

    button.danger:hover:not(:disabled) {
      background: #f85149;
      border-color: #ff7b72;
    }

    button.secondary {
      background: #1f6feb;
      border-color: #388bfd;
    }

    button.secondary:hover:not(:disabled) {
      background: #388bfd;
      border-color: #58a6ff;
    }

    /* Terminal container */
    #terminal-container {
      flex: 1;
      overflow: hidden;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    .xterm {
      height: 100%;
      width: 100%;
      flex: 1;
    }

    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 14px;
      color: #8b949e;
      gap: 24px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #30363d;
      border-top: 2px solid #58a6ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .loading-text p {
      margin: 0;
      font-size: 14px;
    }

    .quick-start {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.6;
      max-width: 400px;
    }

    .quick-start h3 {
      margin: 0 0 8px 0;
      font-size: 13px;
      color: #58a6ff;
    }

    .quick-start code {
      background: #0d1117;
      padding: 2px 6px;
      border-radius: 3px;
      color: #79c0ff;
      font-size: 11px;
    }

    .quick-start ul {
      margin: 8px 0 0 16px;
      padding: 0;
    }

    .quick-start li {
      margin: 4px 0;
    }

    /* Responsive */
    @media (max-width: 800px) {
      #header {
        flex-direction: column;
        align-items: flex-start;
      }

      #env-info {
        width: 100%;
        flex-direction: column;
        align-items: flex-start;
      }

      #tunnel-section {
        flex-direction: column;
        align-items: flex-start;
      }

      #tunnel-url {
        max-width: 100%;
      }
    }

    /* Status indicator */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #238636;
      margin-right: 4px;
    }

    .status-dot.disconnected {
      background: #da3633;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <div id="header">
      <h1>
        🚀 TempDev
      </h1>
      <div id="env-info">
        <span>
          <span class="status-dot" id="status-dot"></span>
          <strong id="env-id">-</strong>
        </span>
        <span>Uptime: <strong id="uptime">0s</strong></span>
        <span>Idle: <strong id="idle">0s</strong></span>
        <div id="tunnel-section">
          <span>Public:</span>
          <a id="tunnel-url" href="#" target="_blank">loading...</a>
          <div style="display: flex; gap: 4px;">
            <button onclick="copyTunnel(event)" class="secondary">Copy</button>
            <button onclick="unexposePort()" class="danger" style="padding: 4px 8px; font-size: 10px;">Stop</button>
          </div>
        </div>
        <div id="controls">
          <button onclick="createEnv()">New</button>
          <button onclick="promptExpose()" id="expose-btn" disabled>Expose</button>
          <button class="danger" onclick="destroyEnv()" id="destroy-btn" disabled>Destroy</button>
        </div>
      </div>
    </div>

    <!-- Terminal Container -->
    <div id="terminal-container">
      <div id="loading">
        <div class="loading-text">
          <div class="spinner"></div>
          <p><strong>TempDev</strong> - Temporary Cloud Dev Environments</p>
          <p style="font-size: 12px; color: #6e7681;">Click <strong>New</strong> to get started</p>
        </div>
        <div class="quick-start">
          <h3>Quick Start</h3>
          <ul>
            <li>Click <code>New</code> to create an environment</li>
            <li>Use the terminal to run commands</li>
            <li>Click <code>Expose</code> to share a port</li>
            <li>Environments auto-delete after 15 min idle</li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- Load xterm.js -->
  <link rel="stylesheet" href="https://unpkg.com/xterm@5.1.0/css/xterm.css" />
  <script src="https://unpkg.com/xterm@5.1.0/lib/xterm.js"></script>
  <script src="https://unpkg.com/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.js"></script>

  <script>
    // ========================================================================
    // State
    // ========================================================================

    let term = null;
    let ws = null;
    let currentEnvId = null;
    let createdAt = null;
    let lastActivityTime = null;

    const Terminal = window.Terminal;
    const FitAddon = window.FitAddon.FitAddon;

    // ========================================================================
    // Create Environment
    // ========================================================================

    async function createEnv() {
      try {
        document.getElementById('controls').querySelectorAll('button').forEach(b => b.disabled = true);

        const response = await fetch('/env', { method: 'POST' });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || 'Failed to create environment');
        }

        const data = await response.json();
        currentEnvId = data.id;
        createdAt = new Date();
        lastActivityTime = new Date();

        // Update UI
        document.getElementById('env-id').textContent = currentEnvId;
        document.getElementById('status-dot').classList.remove('disconnected');
        document.getElementById('tunnel-section').style.display = 'none';

        const loadingDiv = document.getElementById('loading');
        if (loadingDiv) {
          document.getElementById('terminal-container').removeChild(loadingDiv);
        }

        // Initialize terminal if needed
        if (!term) {
          initTerminal();
        } else {
          term.clear();
        }

        // Connect WebSocket
        connectShell();

        // Start uptime/idle timer
        startTimers();

        // Enable buttons
        document.getElementById('expose-btn').disabled = false;
        document.getElementById('destroy-btn').disabled = false;
      } catch (err) {
        alert('Failed to create environment:\n' + err.message);
        document.getElementById('controls').querySelectorAll('button').forEach(b => b.disabled = false);
      }
    }

    // ========================================================================
    // Terminal Initialization
    // ========================================================================

    function initTerminal() {
      term = new Terminal({
        cols: 120,
        rows: 30,
        theme: {
          background: '#0d1117',
          foreground: '#c9d1d9',
          cursor: '#58a6ff',
          selection: 'rgba(88, 166, 255, 0.2)',
          black: '#484f58',
          red: '#f85149',
          green: '#3fb950',
          yellow: '#d29922',
          blue: '#58a6ff',
          magenta: '#bc8ef9',
          cyan: '#79c0ff',
          white: '#b1bac4',
        },
        fontSize: 13,
        fontFamily: "'Courier New', monospace",
        scrollback: 1000,
        tabStopWidth: 4,
      });

      const fitAddon = new FitAddon();
      term.loadAddon(fitAddon);

      const container = document.getElementById('terminal-container');
      term.open(container);

      try {
        fitAddon.fit();
      } catch (e) {
        console.log('Fit error:', e);
      }

      // Fit on resize
      window.addEventListener('resize', () => {
        try {
          fitAddon.fit();
        } catch (e) {
          console.log('Fit error on resize:', e);
        }
      });

      term.focus();
    }

    // ========================================================================
    // WebSocket Shell
    // ========================================================================

    function connectShell() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${protocol}//${window.location.host}/ws/env/${currentEnvId}`;

      ws = new WebSocket(url);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        console.log('WebSocket connected');
        term.focus();
        if (term) {
          term.write('\x1b[32m✓ Connected\x1b[0m\r\n');
          // Send initial size
          const dims = { cols: term.cols, rows: term.rows };
          ws.send(JSON.stringify(dims));
        }
      };

      ws.onmessage = (event) => {
        if (term) {
          if (event.data instanceof ArrayBuffer) {
            term.write(new Uint8Array(event.data));
          } else {
            term.write(event.data);
          }
        }
        lastActivityTime = new Date();
      };

      ws.onerror = (err) => {
        console.error('WebSocket error:', err);
        if (term) {
          term.write('\r\n\x1b[31m✗ WebSocket error\x1b[0m\r\n');
        }
        document.getElementById('status-dot').classList.add('disconnected');
      };

      ws.onclose = () => {
        console.log('WebSocket closed');
        if (term) {
          term.write('\r\n\x1b[33m⚠ Session ended\x1b[0m\r\n');
        }
        document.getElementById('status-dot').classList.add('disconnected');
      };

      // Send user input to server
      if (term) {
        term.onData((data) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(data);
            lastActivityTime = new Date();
          }
        });

        term.onResize((size) => {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ cols: size.cols, rows: size.rows }));
          }
        });
      }
    }

    // ========================================================================
    // Port Exposure
    // ========================================================================

    function promptExpose() {
      const port = prompt('Enter port number (e.g., 3000, 8000):', '3000');
      if (!port) return;

      exposePort(port);
    }

    async function exposePort(port) {
      if (!currentEnvId) {
        alert('No active environment');
        return;
      }

      try {
        document.getElementById('expose-btn').disabled = true;

        const response = await fetch(`/expose/${currentEnvId}/${port}`, { method: 'POST' });

        if (!response.ok) {
          throw new Error(await response.text());
        }

        const data = await response.json();

        document.getElementById('tunnel-url').href = data.tunnel_url;
        document.getElementById('tunnel-url').textContent = data.tunnel_url.replace('https://', '');
        document.getElementById('tunnel-section').style.display = 'flex';

        if (term) {
          term.write(`\r\n\x1b[36m✓ Tunnel created for port ${port}\x1b[0m\r\n`);
          term.write(`\x1b[36m  URL: ${data.tunnel_url}\x1b[0m\r\n`);
          term.write(`\x1b[33m  Note: ${data.note}\x1b[0m\r\n`);
        }

        document.getElementById('expose-btn').disabled = false;
      } catch (err) {
        alert('Failed to expose port:\n' + err.message);
        document.getElementById('expose-btn').disabled = false;
      }
    }

    function copyTunnel(event) {
      const url = document.getElementById('tunnel-url').href;
      navigator.clipboard.writeText(url).then(() => {
        const btn = event.target;
        const original = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => { btn.textContent = original; }, 2000);
      });
    }

    async function unexposePort() {
      if (!currentEnvId) return;
      if (!confirm('Stop the public tunnel?')) return;

      try {
        const response = await fetch(`/expose/${currentEnvId}`, { method: 'DELETE' });
        if (!response.ok) throw new Error(await response.text());

        document.getElementById('tunnel-section').style.display = 'none';
        if (term) {
          term.write('\r\n\x1b[33m🛑 Tunnel stopped\x1b[0m\r\n');
        }
      } catch (err) {
        alert('Failed to stop tunnel:\n' + err.message);
      }
    }

    // ========================================================================
    // Destroy Environment
    // ========================================================================

    async function destroyEnv() {
      if (!currentEnvId) {
        alert('No active environment');
        return;
      }

      if (!confirm('Destroy this environment? This cannot be undone.')) {
        return;
      }

      try {
        document.getElementById('destroy-btn').disabled = true;

        const response = await fetch(`/env/${currentEnvId}`, { method: 'DELETE' });

        if (!response.ok) {
          throw new Error(await response.text());
        }

        // Close WebSocket
        if (ws) ws.close();

        // Reset state
        currentEnvId = null;
        createdAt = null;
        lastActivityTime = null;

        // Reset UI
        document.getElementById('env-id').textContent = '-';
        document.getElementById('uptime').textContent = '0s';
        document.getElementById('idle').textContent = '0s';
        document.getElementById('tunnel-section').style.display = 'none';
        document.getElementById('status-dot').classList.add('disconnected');

        // Clear terminal
        if (term) {
          term.clear();
          term.write('Environment destroyed. Click "New" to create another.\r\n');
        }

        // Reset buttons
        document.getElementById('expose-btn').disabled = true;
        document.getElementById('destroy-btn').disabled = true;
      } catch (err) {
        alert('Failed to destroy environment:\n' + err.message);
        document.getElementById('destroy-btn').disabled = false;
      }
    }

    // ========================================================================
    // Timers
    // ========================================================================

    let uptimeInterval = null;
    let idleInterval = null;

    function startTimers() {
      // Clear old intervals
      if (uptimeInterval) clearInterval(uptimeInterval);
      if (idleInterval) clearInterval(idleInterval);

      // Update uptime every second
      uptimeInterval = setInterval(() => {
        if (!createdAt) return;
        const elapsed = Math.floor((new Date() - createdAt) / 1000);
        document.getElementById('uptime').textContent = formatTime(elapsed);
      }, 1000);

      // Update idle every second
      idleInterval = setInterval(() => {
        if (!lastActivityTime) return;
        const idle = Math.floor((new Date() - lastActivityTime) / 1000);
        document.getElementById('idle').textContent = formatTime(idle);

        // Change color if idle > 10 minutes
        const idleEl = document.getElementById('idle').parentElement;
        if (idle > 600) {
          idleEl.style.color = '#f85149';
        } else if (idle > 300) {
          idleEl.style.color = '#d29922';
        } else {
          idleEl.style.color = '#8b949e';
        }
      }, 1000);
    }

    function formatTime(seconds) {
      const hours = Math.floor(seconds / 3600);
      const minutes = Math.floor((seconds % 3600) / 60);
      const secs = seconds % 60;

      if (hours > 0) {
        return `${hours}h ${minutes}m`;
      }
      if (minutes > 0) {
        return `${minutes}m ${secs}s`;
      }
      return `${secs}s`;
    }

    // ========================================================================
    // Init
    // ========================================================================

    document.addEventListener('DOMContentLoaded', () => {
      console.log('🚀 TempDev loaded');
      // Don't auto-create; let user click "New"
    });
  </script>
</body>
</html>
